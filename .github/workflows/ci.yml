name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run compile

      - name: Test
        run: bun run test

      - name: Build (Chrome MV3)
        run: bun run build

      - name: Build (Firefox MV2)
        run: bun run build:firefox
